<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Restrictions: No zoom in, no zoom out -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Hub</title>
    <style>
        /* Base Theme & Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Hide tap to hold link function on mobile */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #ffffff; /* White main background */
            color: #000000;
            overflow-x: hidden;
        }

        /* Landscape Restriction Overlay */
        #landscape-warning {
            display: none;
        }
        @media screen and (orientation: landscape) {
            #main-content, header {
                display: none !important;
            }
            #landscape-warning {
                display: flex;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background-color: #000000;
                color: #ffffff;
                z-index: 9999;
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 20px;
                font-size: 1.2rem;
                font-weight: bold;
            }
        }

        /* Header Styling */
        header {
            background-color: #000000;
            height: 70px; /* Fixed height for edge-to-edge calculation */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        header a {
            display: inline-block;
            height: 100%;
        }

        header img {
            height: 100%; /* Edge to edge with header */
            width: auto;
            display: block;
        }

        /* Card Grid Layout */
        .card-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Pairs side by side */
            gap: 15px;
            padding: 40px 15px 20px 15px; /* Top padding allows for 3D pop-out space */
            max-width: 600px;
            margin: 0 auto;
        }

        /* Individual Card Links */
        .card {
            text-decoration: none;
            color: inherit;
            position: relative;
            height: 220px;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        /* Grey Box with Top Cut Design */
        .card-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e0e0e0;
            /* Little cutted top edge for design (Top Left) */
            clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%, 0 20px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 80% / 20% Separation Design */
        .card-bg::after {
            content: '';
            position: absolute;
            bottom: 20%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #000000; /* Distinct separation line */
            z-index: 1;
        }

        /* Text Area (Bottom 20%) */
        .card-text {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5px;
            z-index: 2;
        }

        .card-text h3 {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.1;
            color: #000000;
        }

        .card-text p {
            font-size: 0.6rem;
            font-weight: 500;
            color: #555555;
            margin-top: 2px;
        }

        /* 3D Character PNG */
        .card-character {
            position: absolute;
            bottom: 20%; /* Sits exactly on the 20% separation */
            left: 0;
            width: 100%;
            height: 85%; /* 80% box + 5% pop out top = 85% */
            object-fit: contain;
            object-position: bottom center;
            /* Shadow for 3D look */
            filter: drop-shadow(0px -5px 8px rgba(0,0,0,0.4));
            z-index: 3;
            /* Swipe up smoothly on load */
            opacity: 0;
            animation: swipeUpSmooth 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Add slight delays so they don't all pop up at the exact same millisecond */
        .card:nth-child(1) .card-character { animation-delay: 0.1s; }
        .card:nth-child(2) .card-character { animation-delay: 0.2s; }
        .card:nth-child(3) .card-character { animation-delay: 0.3s; }
        .card:nth-child(4) .card-character { animation-delay: 0.4s; }

        @keyframes swipeUpSmooth {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Small Logo on Right Side */
        .card-badge {
            position: absolute;
            right: 8%;
            bottom: calc(20% - 15px); /* Exactly between 80% and 20% */
            width: 30px;
            height: 30px;
            background-color: #000; /* Black background to match theme */
            border-radius: 50%;
            padding: 4px;
            z-index: 10;
            object-fit: contain;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <!-- Landscape Warning -->
    <div id="landscape-warning">
        Please rotate your device to Portrait Mode to view this website.
    </div>

    <header>
        <a href="index.html">
            <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-03-30_08-28-40-573.png?updatedAt=1774839553114" alt="Main Logo">
        </a>
    </header>

    <main id="main-content">
        <div class="card-container">
            
            <!-- Card 1 -->
            <a href="freerule.html" class="card">
                <div class="card-bg">
                    <div class="card-text">
                        <h3>Free Tournament Rule</h3>
                        <p>Important to follow</p>
                    </div>
                </div>
                <img src="https://dl.dir.freefiremobile.com/common/web_event/official2.ff.garena.all/20229/a00504b94adddc82ae3ff2bfc53b568b.png" alt="Character" class="card-character">
                <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-02-26_14-18-51-931.png?updatedAt=1772095781110" alt="Logo Badge" class="card-badge">
            </a>

            <!-- Card 2 -->
            <a href="paidrule.html" class="card">
                <div class="card-bg">
                    <div class="card-text">
                        <h3>Paid Tournament Rule</h3>
                        <p>E-Sport Protection</p>
                    </div>
                </div>
                <img src="https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/20ca50be91eaaa4c33a92777c8429b24.png" alt="Character" class="card-character">
                <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-02-26_14-18-51-931.png?updatedAt=1772095781110" alt="Logo Badge" class="card-badge">
            </a>

            <!-- Card 3 -->
            <a href="#" class="card">
                <div class="card-bg">
                    <div class="card-text">
                        <h3>Mega Tournament</h3>
                        <p>extream compitative</p>
                    </div>
                </div>
                <img src="https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/181faa683450fa82e5b7ffe068a9c7f9.png" alt="Character" class="card-character">
                <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-02-26_14-18-51-931.png?updatedAt=1772095781110" alt="Logo Badge" class="card-badge">
            </a>

            <!-- Card 4 -->
            <a href="motive.html" class="card">
                <div class="card-bg">
                    <div class="card-text">
                        <h3>who i am ?</h3>
                        <p>Motive ?</p>
                    </div>
                </div>
                <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-03-30_09-19-36-959.png" alt="Character" class="card-character">
                <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-02-26_14-18-51-931.png?updatedAt=1772095781110" alt="Logo Badge" class="card-badge">
            </a>

        </div>
    </main>

    <script>
        // Restriction 1: No Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Restriction 2: Inspect Mode Off (Block F12, Ctrl+Shift+I/J, Ctrl+U)
        document.onkeydown = function (e) {
            if (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'U') ||
                (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'J')) ||
                (e.metaKey && e.key === 'U')
            ) {
                e.preventDefault();
                return false;
            }
        };

        // Restriction 3: Prevent Image Dragging
        const images = document.querySelectorAll('img');
        images.forEach(img => {
            img.addEventListener('dragstart', (e) => {
                e.preventDefault();
            });
        });
    </script>
</body>
</html>
